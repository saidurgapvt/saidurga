<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Gateway - Sai Durga</title>
<link rel="icon" type="image/x-icon" href="logo.png">

<style>
:root {
    --primary-color: #0056b3;
    --primary-gradient: linear-gradient(135deg, #0056b3 0%, #0099ff 100%);
}

/* Clean Light Background */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f7fa; /* light professional */
}

/* Card */
.login-box {
    background: #ffffff;
    padding: 40px 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 360px;
    text-align: center;
}

/* Logo */
.logo {
    font-size: 28px;
    font-weight: 800;
    color: var(--primary-color);
}

.subtitle {
    color: #666;
    margin-bottom: 25px;
    font-size: 14px;
}

/* Input */
.pin-input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1.5px solid #ddd;
    border-radius: 6px;
    font-size: 16px;
    text-align: center;
    letter-spacing: 6px;
    outline: none;
    transition: 0.3s;
}

.pin-input:focus {
    border-color: var(--primary-color);
}

/* Button */
.login-btn {
    background: var(--primary-gradient);
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 12px rgba(0,86,179,0.25);
}

/* Error */
#error-msg {
    color: #d32f2f;
    margin-top: 12px;
    font-size: 13px;
    display: none;
}

/* Back Button */
.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    background: #ffffff;
    color: #004080;
    padding: 8px 14px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid #ddd;
    transition: 0.3s;
}

.back-btn:hover {
    background: #004080;
    color: white;
}
</style>
</head>

<body>

<a href="index.html" class="back-btn">← Home</a>

<div class="login-box">
    <div class="logo">Sai Durga</div>
    <div class="subtitle">Secure ERP Gateway</div>

    <input type="password" id="gateway-pin" class="pin-input" placeholder="••••" maxlength="6" autocomplete="off">

    <button onclick="checkGateway()" class="login-btn">
        🔐 Unlock Portal
    </button>

    <div id="error-msg">Incorrect Passcode</div>
</div>

<script>
const encodedUrl = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J4S0VUeUpWSFY1M3N1c3MxZzVobWpXOTFPWU5CVUdnSlJ6LW9iU0xPSm8yZ2tsVUEwS0VmMlktN2o0d0dZYk5zVTU5dy9leGVj";

const SECURE_HASH = "8f8472a2f6ec348bfc7577a035c7f34a04c62f0c757b54687e1175236dcf393b";

async function checkGateway() {
    const pinEntered = document.getElementById("gateway-pin").value.trim();
    const errorMsg = document.getElementById("error-msg");

    try {
        const encoder = new TextEncoder();
        const data = encoder.encode(pinEntered);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const enteredHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        if (enteredHash === SECURE_HASH) {
            errorMsg.style.display = "none";
            document.querySelector('.login-btn').innerText = "Redirecting...";
            window.location.href = atob(encodedUrl);
        } else {
            errorMsg.style.display = "block";
            document.getElementById("gateway-pin").value = "";
        }
    } catch (err) {
        errorMsg.innerText = "Run on HTTPS!";
        errorMsg.style.display = "block";
    }
}

document.getElementById("gateway-pin").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        checkGateway();
    }
});
</script>

</body>
</html>
