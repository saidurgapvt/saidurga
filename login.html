<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Gateway - Sai Durga</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --primary-gradient: linear-gradient(135deg, #0056b3 0%, #0099ff 100%);
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f4;
        }
        .login-box {
            background: white;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .pin-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 4px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        .pin-input:focus {
            border-color: var(--primary-color);
        }
        .login-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 86, 179, 0.3);
        }
        #error-msg {
            color: #d32f2f;
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">Sai Durga</div>
        <div class="subtitle">Enter Gateway Passcode</div>
        
        <input type="password" id="gateway-pin" class="pin-input" placeholder="••••" maxlength="6" autocomplete="off">
        
        <button onclick="checkGateway()" class="login-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
              <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
            </svg>
            Unlock Portal
        </button>

        <div id="error-msg">Incorrect Passcode</div>
    </div>

   <script>
        // The Google Apps Script URL is safely encoded
        const encodedUrl = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J4S0VUeUpWSFY1M3N1c3MxZzVobWpXOTFPWU5CVUdnSlJ6LW9iU0xPSm8yZ2tsVUEwS0VmMlktN2o0d0dZYk5zVTU5dy9leGVj";
                
        // The actual numbers "2086" are nowhere in this source code.
        const SECURE_HASH = "9e6a55b6b4563e652a23be9d623ca5055d22eeed58cb9f1db712bc9f2982d02c";

        async function checkGateway() {
            const pinEntered = document.getElementById("gateway-pin").value;
            const errorMsg = document.getElementById("error-msg");

            // Convert the entered PIN into a SHA-256 Hash
            const encoder = new TextEncoder();
            const data = encoder.encode(pinEntered);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const enteredHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            // Compare the Hashes (The hacker cannot reverse-engineer the hash to find the PIN)
            if (enteredHash === SECURE_HASH) {
                errorMsg.style.display = "none";
                document.querySelector('.login-btn').innerHTML = "Redirecting...";
                window.location.href = atob(encodedUrl); 
            } else {
                errorMsg.style.display = "block";
                document.getElementById("gateway-pin").value = "";
            }
        }

        // Allow pressing "Enter" on keyboard to submit
        document.getElementById("gateway-pin").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkGateway();
            }
        });
    </script>
</body>
</html>
